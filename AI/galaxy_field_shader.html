<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STFR Galaxy Field — GPU Shader</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#03050c;--panel:#06091a;--border:#111e38;
  --accent:#00d4ff;--accent2:#ff6b35;--accent3:#7fff6b;
  --text:#b8ccec;--dim:#3a5070;
  --glow:0 0 14px rgba(0,212,255,0.45);
}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:12px;
     display:flex;flex-direction:column;gap:8px;padding:10px;min-height:100vh}
h1{font-family:'Orbitron',monospace;font-size:14px;color:var(--accent);
   letter-spacing:.18em;text-shadow:var(--glow)}
.bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;
     padding:8px 12px;background:var(--panel);border:1px solid var(--border);border-radius:7px}
select,button{font-family:'Share Tech Mono',monospace;font-size:11px;
  background:#060b18;color:var(--accent);border:1px solid var(--border);
  border-radius:4px;padding:3px 8px;cursor:pointer}
button{color:var(--accent2);border-color:var(--accent2)}
select:focus,button:focus{outline:none;border-color:var(--accent)}
.tabs{display:flex;gap:4px}
.tab{padding:3px 10px;border-radius:4px;border:1px solid var(--border);
     background:var(--panel);color:var(--dim);cursor:pointer;font-size:11px}
.tab.active{border-color:var(--accent);color:var(--accent);background:#060d1e}
.status{color:var(--dim);font-size:10px;margin-left:auto;letter-spacing:.06em}

.layout{display:grid;grid-template-columns:1fr 300px;gap:8px;flex:1}
@media(max-width:820px){.layout{grid-template-columns:1fr}}

.canvwrap{position:relative;background:#000;border:1px solid var(--border);border-radius:7px;overflow:hidden}
canvas#gl{display:block;width:100%;height:100%;min-height:500px}
.overlay{position:absolute;top:8px;left:10px;font-size:10px;color:rgba(0,212,255,0.6);pointer-events:none;line-height:1.7}
.crosshair{position:absolute;top:50%;left:50%;width:10px;height:10px;
  border:1px solid rgba(0,212,255,0.25);border-radius:50%;transform:translate(-50%,-50%);pointer-events:none}

.sidebar{display:flex;flex-direction:column;gap:7px}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:7px;padding:9px}
.panel h2{font-family:'Orbitron',monospace;font-size:9px;color:var(--dim);
  letter-spacing:.12em;margin-bottom:7px;text-transform:uppercase}

.row{display:flex;align-items:center;gap:6px;margin:4px 0}
.row label{width:88px;color:var(--dim);font-size:10px;flex-shrink:0}
.row input[type=range]{flex:1;accent-color:var(--accent);height:14px}
.row span{width:44px;text-align:right;color:var(--accent);font-size:10px}
.sechead{font-size:9px;color:var(--dim);letter-spacing:.1em;margin:8px 0 3px;text-transform:uppercase;border-top:1px solid var(--border);padding-top:6px}

.metrics{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.metric{background:#040810;border:1px solid var(--border);border-radius:5px;padding:5px 7px;text-align:center}
.metric b{display:block;font-size:8px;color:var(--dim);letter-spacing:.07em;margin-bottom:2px}
.metric span{font-size:12px;color:var(--accent)}

canvas#rc{display:block;width:100%;height:130px;border-radius:4px;background:#000}
canvas#occ{display:block;width:100%;height:100px;border-radius:4px;background:#000}
</style>
</head>
<body>

<div class="bar">
  <h1>STFR FIELD / GPU</h1>
  <label>Galaxy <select id="gal"></select></label>
  <div class="tabs">
    <div class="tab active" data-mode="0">σ field</div>
    <div class="tab" data-mode="1">|∇σ| accel</div>
    <div class="tab" data-mode="2">split</div>
  </div>
  <span class="status" id="status">initializing…</span>
</div>

<div class="layout">
  <div class="canvwrap" id="wrap">
    <canvas id="gl"></canvas>
    <div class="crosshair"></div>
    <div class="overlay" id="overlay"></div>
  </div>

  <div class="sidebar">
    <div class="panel">
      <h2>Occupation Profile</h2>
      <div class="row"><label>rho0 core</label><input type="range" id="rho0" min="0" max="8" step="0.01"><span id="rho0v"></span></div>
      <div class="row"><label>rho1 rim</label><input type="range" id="rho1" min="0" max="8" step="0.01"><span id="rho1v"></span></div>
      <div class="row"><label>rho2 inner</label><input type="range" id="rho2" min="0" max="8" step="0.01"><span id="rho2v"></span></div>
      <div class="row"><label>rho3 outer</label><input type="range" id="rho3" min="0" max="8" step="0.01"><span id="rho3v"></span></div>
      <div class="row"><label>rho4 edge</label><input type="range" id="rho4" min="0" max="8" step="0.01"><span id="rho4v"></span></div>
      <div class="sechead">Radii</div>
      <div class="row"><label>r1 core end</label><input type="range" id="r1" min="0.02" max="0.18" step="0.002"><span id="r1v"></span></div>
      <div class="row"><label>r2 trans</label><input type="range" id="r2" min="0.05" max="0.32" step="0.002"><span id="r2v"></span></div>
      <div class="row"><label>r3 shelf</label><input type="range" id="r3" min="0.09" max="0.70" step="0.002"><span id="r3v"></span></div>
      <div class="row"><label>r4 edge end</label><input type="range" id="r4" min="0.65" max="1.80" step="0.002"><span id="r4v"></span></div>
      <div class="row"><label>r5 cutoff</label><input type="range" id="r5" min="0.70" max="2.20" step="0.002"><span id="r5v"></span></div>
      <div class="sechead">Physics</div>
      <div class="row"><label>support</label><input type="range" id="support" min="0.002" max="0.08" step="0.001"><span id="supportv"></span></div>
      <div class="row"><label>brightness γ</label><input type="range" id="gamma" min="0.5" max="4.0" step="0.05" value="2.2"><span id="gammav"></span></div>
      <div class="row"><label>log boost</label><input type="range" id="logboost" min="5" max="300" step="1" value="80"><span id="logboostv"></span></div>
      <div class="row"><label>amp</label><input type="range" id="amp" min="50" max="6000" step="1"><span id="ampv"></span></div>
    </div>

    <div class="panel">
      <h2>Metrics</h2>
      <div class="metrics">
        <div class="metric"><b>FW RMS</b><span id="mFw">—</span></div>
        <div class="metric"><b>N RMS</b><span id="mNw">—</span></div>
        <div class="metric"><b>FW AMP</b><span id="mAmp">—</span></div>
        <div class="metric"><b>R_MAX kpc</b><span id="mRmax">—</span></div>
      </div>
    </div>

    <div class="panel">
      <h2>Rotation Curve</h2>
      <canvas id="rc"></canvas>
    </div>

    <div class="panel">
      <h2>Occupation vs Brightness</h2>
      <canvas id="occ"></canvas>
    </div>
  </div>
</div>

<script type="module">
// ── load galaxy data ──
let GALAXIES=[];
try{ const m=await import('./rotmod_ltg_data.mjs'); GALAXIES=m.ROTMOD_GALAXIES; }
catch(e){ GALAXIES=[{name:'DEMO',preset:{rMax:10},rows:[
  {r:1,vObs:50,errV:3,vGas:10,vDisk:35,vBul:0,sbDisk:1.0,sbBul:0},
  {r:2,vObs:72,errV:3,vGas:15,vDisk:50,vBul:0,sbDisk:0.7,sbBul:0},
  {r:3,vObs:82,errV:3,vGas:18,vDisk:55,vBul:0,sbDisk:0.4,sbBul:0},
  {r:5,vObs:84,errV:4,vGas:20,vDisk:55,vBul:0,sbDisk:0.15,sbBul:0},
  {r:7,vObs:80,errV:5,vGas:18,vDisk:52,vBul:0,sbDisk:0.04,sbBul:0},
  {r:9,vObs:74,errV:6,vGas:15,vDisk:48,vBul:0,sbDisk:0.01,sbBul:0},
]}]; }


import { GALAXY_PRESETS, PRESET_ORDER } from './galaxy_presets.mjs';
const PRESETS = GALAXY_PRESETS;

// ── state ──
const $=id=>document.getElementById(id);
let G=null, fwAmp=100, newtonAmp=30, mode=0;
let P={rho0:1.5,rho1:1.2,rho2:1.0,rho3:.7,rho4:.35,r1:.05,r2:.14,r3:.35,r4:.95,r5:1.05,support:.027,amp:100};
let gamma=2.2, logboost=80;

// ── rho (JS for 1D curves) ──
function clamp(v,a,b){return Math.min(b,Math.max(a,v));}
function enforceR(){
  P.r1=clamp(P.r1,.02,.18);P.r2=clamp(Math.max(P.r1+.012,P.r2),.05,.32);
  P.r3=clamp(Math.max(P.r2+.018,P.r3),.09,.70);P.r4=clamp(Math.max(P.r3+.04,P.r4),.65,1.80);
  P.r5=clamp(Math.max(P.r4+.01,P.r5),.70,2.20);
}
function rho(x){
  enforceR();
  if(x<=P.r1)return P.rho0+(P.rho1-P.rho0)*(x/P.r1);
  if(x<=P.r2)return P.rho1+(P.rho2-P.rho1)*((x-P.r1)/(P.r2-P.r1));
  if(x<=P.r3)return P.rho2+(P.rho3-P.rho2)*((x-P.r2)/(P.r3-P.r2));
  if(x<=P.r4)return P.rho3+(P.rho4-P.rho3)*((x-P.r3)/(P.r4-P.r3));
  if(x<=P.r5)return P.rho4*(1-(x-P.r4)/(P.r5-P.r4));
  return 0;
}

// ── 1D physics (JS) for rotation curve ──
let cache1d=null;
function inv1d(){cache1d=null;}
function build1d(){
  if(cache1d)return cache1d;
  const NR=168,NA=96,maxR=Math.max(P.r5,.05),sup=P.support;
  const soft=Math.max(.012,.021*1.75,maxR/NR*1.6), soft2=soft*soft;
  const xmax=Math.max(2.35,P.r5*1.15),N=380,xs=[],sig=[];
  for(let i=0;i<N;i++){
    const x=i/(N-1)*xmax; xs.push(x);
    let s=0;
    for(let ri=0;ri<NR;ri++){
      const rr=(ri+.5)/NR*maxR,dr=maxR/NR,den=rho(rr);
      if(den<=0)continue;
      const d2=sup*den*den; let avg=0;
      for(let a=0;a<NA;a++){
        const th=(a+.5)/NA*Math.PI*2,dx=x-rr*Math.cos(th),dy=rr*Math.sin(th);
        avg+=Math.sqrt(1+d2/(dx*dx+dy*dy+soft2))-1;
      }
      s+=(avg/NA)*den*rr*dr*Math.PI*2;
    }
    sig.push(s);
  }
  const sm=sig.slice(),kernel=[1,4,7,10,7,4,1],ks=34;
  for(let i=0;i<N;i++){let acc=0;for(let k=0;k<7;k++){const j=Math.min(N-1,Math.max(0,i+k-3));acc+=sig[j]*kernel[k];}sm[i]=acc/ks;}
  const grad=[];
  for(let i=0;i<N;i++){const i0=Math.max(0,i-2),i1=Math.min(N-1,i+2);grad.push((sm[i1]-sm[i0])/(xs[i1]-xs[i0]||1));}
  cache1d={xs,sig:sm,grad,xmax,N};return cache1d;
}
function interp1(arr,x){const c=build1d();if(x<=0)return arr[0];if(x>=c.xmax)return arr[c.N-1];const f=x/c.xmax*(c.N-1),i=Math.floor(f),t=f-i;return arr[i]*(1-t)+arr[i+1]*t;}
function shapeFW(x){const c=build1d();const g=interp1(c.grad,x);return Math.sqrt(Math.max(x*Math.max(0,-g),0));}
function mEnc(x){let m=0,N=120;for(let i=0;i<N;i++){const rr=(i+.5)/N*x;m+=rho(rr)*rr*(x/N);}return 2*Math.PI*m;}
function shapeN(x){return Math.sqrt(Math.max(mEnc(x)/Math.max(x,1e-4),0));}
function fitScale(fn){if(!G)return 100;let n=0,d=0;for(const r of G.rows){const x=r.r/G.preset.rMax,s=fn(x),w=1/Math.max(1,r.errV*r.errV);n+=s*r.vObs*w;d+=s*s*w;}return d?n/d:100;}
function rmsV(fn,a){if(!G)return 0;let s=0,n=0;for(const r of G.rows){const x=r.r/G.preset.rMax,e=a*fn(x)-r.vObs;s+=e*e;n++;}return Math.sqrt(s/Math.max(1,n));}

// ══════════════════════════════════════════════
// WebGL shader setup
// ══════════════════════════════════════════════
const cvs=$('gl');
const gl=cvs.getContext('webgl2')||cvs.getContext('webgl',{antialias:false});
if(!gl){$('status').textContent='WebGL not available';throw new Error('no webgl');}

const VS=`#version 300 es
precision highp float;
in vec2 aPos;
out vec2 vUV;
void main(){vUV=aPos*.5+.5;gl_Position=vec4(aPos,0,1);}`;

// The fragment shader evaluates sigma(px,py) at full resolution.
// Rho profile is passed as two vec4 uniforms (5 rho values, 5 radii).
// Angular integral is unrolled to NA_STEPS samples.
// Gradient is estimated via finite difference (±eps).
const FS=`#version 300 es
precision highp float;
in vec2 vUV;
out vec4 fragColor;

// occupation profile
uniform float rho0,rho1,rho2,rho3,rho4;
uniform float ur1,ur2,ur3,ur4,ur5;
uniform float support,maxR,soft2;
uniform float viewR;    // world units visible from center to edge
uniform int   dispMode; // 0=sigma, 1=grad, 2=split
uniform float logBoost;
uniform float gamma;
uniform float fdEps;    // finite-difference epsilon

#define NR 56
#define NA 64
#define PI 3.14159265358979

// Low-discrepancy hash for jitter — breaks coherent spoke aliasing
float hash(float a, float b){
  return fract(sin(a*127.1+b*311.7)*43758.5453);
}

float rhoAt(float x){
  if(x<=0.0)return rho0;
  if(x<=ur1)return rho0+(rho1-rho0)*(x/ur1);
  if(x<=ur2)return rho1+(rho2-rho1)*((x-ur1)/(ur2-ur1));
  if(x<=ur3)return rho2+(rho3-rho2)*((x-ur2)/(ur3-ur2));
  if(x<=ur4)return rho3+(rho4-rho3)*((x-ur3)/(ur4-ur3));
  if(x<=ur5)return rho4*(1.0-(x-ur4)/(ur5-ur4));
  return 0.0;
}

float sigma(float px, float py){
  float s=0.0;
  // Stratified jitter seed based on pixel position
  float seed=fract(px*73.13+py*151.97);
  for(int i=0;i<NR;i++){
    float fi=float(i);
    // Jitter radial position within shell
    float rjit=hash(fi,seed+0.1)-0.5;
    float rr=(fi+0.5+rjit*0.6)/float(NR)*maxR;
    rr=clamp(rr,0.001,maxR);
    float den=rhoAt(rr);
    if(den<=0.0)continue;
    float d2=support*den*den;
    float dr=maxR/float(NR);
    float avg=0.0;
    // Angular offset per ring — golden-angle derived, unique per shell
    float angOffset=hash(fi*7.3,seed+0.5)*2.0*PI;
    // Scale NA with radius: more samples near center where geometry is tighter
    int na=NA;
    float avgF=0.0;
    for(int a=0;a<NA;a++){
      // Stratified angular sample with per-ring jitter
      float ajit=hash(fi+float(a)*0.1,seed+0.7)-0.5;
      float th=(float(a)+0.5+ajit*0.8)/float(NA)*2.0*PI + angOffset;
      float dx=px-rr*cos(th);
      float dy=py-rr*sin(th);
      avgF+=sqrt(1.0+d2/(dx*dx+dy*dy+soft2))-1.0;
    }
    s+=(avgF/float(NA))*den*rr*dr*2.0*PI;
  }
  return s;
}

// log-compress and gamma
float compress(float v, float boost, float g){
  float t=log(1.0+v*boost)/log(1.0+boost);
  return pow(clamp(t,0.0,1.0),1.0/g);
}

// color maps
vec3 colorSigma(float t){
  // deep space: black -> midnight blue -> electric blue -> cyan -> white
  vec3 c0=vec3(0.01,0.02,0.06);
  vec3 c1=vec3(0.02,0.08,0.35);
  vec3 c2=vec3(0.0,0.35,0.85);
  vec3 c3=vec3(0.0,0.85,1.0);
  vec3 c4=vec3(1.0,1.0,1.0);
  if(t<0.25)return mix(c0,c1,t/0.25);
  if(t<0.5) return mix(c1,c2,(t-0.25)/0.25);
  if(t<0.75)return mix(c2,c3,(t-0.5)/0.25);
  return mix(c3,c4,(t-0.75)/0.25);
}

vec3 colorGrad(float t){
  // black -> deep purple -> magenta -> orange -> yellow-white
  vec3 c0=vec3(0.01,0.0,0.04);
  vec3 c1=vec3(0.25,0.0,0.55);
  vec3 c2=vec3(0.95,0.0,0.6);
  vec3 c3=vec3(1.0,0.5,0.05);
  vec3 c4=vec3(1.0,1.0,0.7);
  if(t<0.25)return mix(c0,c1,t/0.25);
  if(t<0.5) return mix(c1,c2,(t-0.25)/0.25);
  if(t<0.75)return mix(c2,c3,(t-0.5)/0.25);
  return mix(c3,c4,(t-0.75)/0.25);
}

void main(){
  // world coords: center=(0,0), viewR = half-width
  vec2 uv = vUV*2.0-1.0;
  float px = uv.x*viewR;
  float py = uv.y*viewR;

  float s  = sigma(px,py);
  float sx = sigma(px+fdEps,py);
  float sy = sigma(px,py+fdEps);
  float gx = (sx-s)/fdEps;
  float gy = (sy-s)/fdEps;
  float gm = length(vec2(gx,gy));

  // split mode: left=sigma, right=grad
  bool leftHalf = uv.x < 0.0;

  vec3 col;
  if(dispMode==0 || (dispMode==2 && leftHalf)){
    float t=compress(s,logBoost,gamma);
    col=colorSigma(t);
  } else {
    float t=compress(gm,logBoost*2.5,gamma);
    col=colorGrad(t);
  }

  // ring overlays (dashed circles at r1..r5)
  float r=length(vec2(px,py));
  float rings[5];
  rings[0]=ur1; rings[1]=ur2; rings[2]=ur3; rings[3]=ur4; rings[4]=ur5;
  vec3 ringColors[5];
  ringColors[0]=vec3(1.0,1.0,0.3);
  ringColors[1]=vec3(1.0,0.8,0.2);
  ringColors[2]=vec3(0.3,1.0,0.3);
  ringColors[3]=vec3(0.0,0.85,1.0);
  ringColors[4]=vec3(1.0,0.42,0.2);

  float pixelSize=viewR*2.0/800.0; // approx
  for(int i=0;i<5;i++){
    float dr=abs(r-rings[i]);
    if(dr<pixelSize*1.4){
      float angle=atan(py,px);
      float dash=mod(angle*rings[i]/pixelSize,12.0);
      if(dash<7.0){
        float blend=1.0-dr/(pixelSize*1.4);
        col=mix(col,ringColors[i]*0.8,blend*0.65);
      }
    }
  }

  // split divider line
  if(dispMode==2 && abs(uv.x)<pixelSize*1.5)
    col=vec3(0.15,0.25,0.4);

  fragColor=vec4(col,1.0);
}`;

function compileShader(src,type){
  const s=gl.createShader(type);
  gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))
    throw new Error(gl.getShaderInfoLog(s));
  return s;
}
function linkProgram(vs,fs){
  const p=gl.createProgram();
  gl.attachShader(p,vs); gl.attachShader(p,fs);
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS))
    throw new Error(gl.getProgramInfoLog(p));
  return p;
}

let prog;
try{
  prog=linkProgram(
    compileShader(VS,gl.VERTEX_SHADER),
    compileShader(FS,gl.FRAGMENT_SHADER)
  );
}catch(e){$('status').textContent='Shader error: '+e.message;throw e;}

// fullscreen quad
const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const aPos=gl.getAttribLocation(prog,'aPos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,0,0);

// uniform locations
const U={};
['rho0','rho1','rho2','rho3','rho4',
 'ur1','ur2','ur3','ur4','ur5',
 'support','maxR','soft2','viewR','dispMode',
 'logBoost','gamma','fdEps'
].forEach(n=>U[n]=gl.getUniformLocation(prog,n));

function setUniforms(){
  enforceR();
  gl.useProgram(prog);
  gl.uniform1f(U.rho0,P.rho0); gl.uniform1f(U.rho1,P.rho1);
  gl.uniform1f(U.rho2,P.rho2); gl.uniform1f(U.rho3,P.rho3);
  gl.uniform1f(U.rho4,P.rho4);
  gl.uniform1f(U.ur1,P.r1); gl.uniform1f(U.ur2,P.r2);
  gl.uniform1f(U.ur3,P.r3); gl.uniform1f(U.ur4,P.r4);
  gl.uniform1f(U.ur5,P.r5);
  const maxR=Math.max(P.r5,.05), NR=48;
  const soft=Math.max(.012,.021*1.75,maxR/NR*1.6);
  gl.uniform1f(U.support,P.support);
  gl.uniform1f(U.maxR,maxR);
  gl.uniform1f(U.soft2,soft*soft);
  const viewR=Math.max(P.r5*1.25,1.3);
  gl.uniform1f(U.viewR,viewR);
  gl.uniform1i(U.dispMode,mode);
  gl.uniform1f(U.logBoost,logboost);
  gl.uniform1f(U.gamma,gamma);
  gl.uniform1f(U.fdEps,viewR/400.0);
}

function glDraw(){
  const dpr=Math.min(devicePixelRatio||1,2);
  const rect=cvs.getBoundingClientRect();
  cvs.width=Math.round(rect.width*dpr);
  cvs.height=Math.round(rect.height*dpr);
  gl.viewport(0,0,cvs.width,cvs.height);
  setUniforms();
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}

// ── 2D canvas charts (RC, occ) ──
function poly2d(ctx,pts,sx,sy,col,lw=2,dash=[]){
  ctx.save();ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.setLineDash(dash);
  ctx.beginPath();pts.forEach(([x,y],i)=>i?ctx.lineTo(sx(x),sy(y)):ctx.moveTo(sx(x),sy(y)));
  ctx.stroke();ctx.restore();
}
function drawRC(){
  const c=$('rc'),dpr=Math.min(devicePixelRatio||1,2),rect=c.getBoundingClientRect();
  c.width=Math.round(rect.width*dpr);c.height=Math.round(rect.height*dpr);
  const ctx=c.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);
  const W=rect.width,H=rect.height,pad=26;
  ctx.fillStyle='#03050c';ctx.fillRect(0,0,W,H);
  if(!G)return;
  const xmax=Math.max(1.55,P.r5*1.08),N=100;
  const fw=[],nw=[];
  for(let i=0;i<N;i++){const x=i/(N-1)*xmax;fw.push([x,fwAmp*shapeFW(x)]);nw.push([x,newtonAmp*shapeN(x)]);}
  const vobs=G.rows.map(r=>r.vObs);
  const ymax=Math.max(...vobs,...fw.map(p=>p[1]),...nw.map(p=>p[1]),1)*1.12;
  const sx=x=>pad+x/xmax*(W-2*pad),sy=y=>H-pad-y/ymax*(H-2*pad);
  // grid
  ctx.strokeStyle='#0a1420';ctx.lineWidth=1;
  for(let i=0;i<=3;i++){const y=ymax*i/3;ctx.beginPath();ctx.moveTo(pad,sy(y));ctx.lineTo(W-pad,sy(y));ctx.stroke();}
  poly2d(ctx,nw,sx,sy,'#3a5070',1.2,[4,3]);
  poly2d(ctx,fw,sx,sy,'#00d4ff',2);
  for(const r of G.rows){
    const x=r.r/G.preset.rMax;
    ctx.strokeStyle='#3a5070';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(sx(x),sy(r.vObs-r.errV));ctx.lineTo(sx(x),sy(r.vObs+r.errV));ctx.stroke();
    ctx.fillStyle='#b8ccec';ctx.beginPath();ctx.arc(sx(x),sy(r.vObs),2,0,Math.PI*2);ctx.fill();
  }
  ctx.fillStyle='#3a5070';ctx.font='9px Share Tech Mono';
  ctx.fillText('r/Rmax',W-pad-35,H-4);
}
function drawOcc(){
  const c=$('occ'),dpr=Math.min(devicePixelRatio||1,2),rect=c.getBoundingClientRect();
  c.width=Math.round(rect.width*dpr);c.height=Math.round(rect.height*dpr);
  const ctx=c.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);
  const W=rect.width,H=rect.height,pad=26;
  ctx.fillStyle='#03050c';ctx.fillRect(0,0,W,H);
  const xmax=Math.max(1.55,P.r5*1.08);
  const rMax=Math.max(P.rho0,P.rho1,P.rho2,P.rho3,P.rho4)*1.1||1;
  const sx=x=>pad+x/xmax*(W-2*pad),sy=y=>H-pad-y/rMax*(H-2*pad);
  if(G){
    const bs=G.rows.map(r=>Math.max(0,r.sbDisk+r.sbBul)),bMax=Math.max(...bs,1);
    ctx.strokeStyle='#1e3050';ctx.lineWidth=1.5;
    ctx.beginPath();G.rows.forEach((r,i)=>{const x=r.r/G.preset.rMax,y=bs[i]/bMax*rMax;i?ctx.lineTo(sx(x),sy(y)):ctx.moveTo(sx(x),sy(y));});ctx.stroke();
    ctx.fillStyle='rgba(30,48,80,0.2)';ctx.beginPath();ctx.moveTo(sx(0),sy(0));
    G.rows.forEach((r,i)=>{ctx.lineTo(sx(r.r/G.preset.rMax),sy(bs[i]/bMax*rMax));});
    ctx.lineTo(sx(G.rows[G.rows.length-1].r/G.preset.rMax),sy(0));ctx.closePath();ctx.fill();
  }
  const rpts=[];for(let i=0;i<180;i++){const x=i/179*xmax;rpts.push([x,rho(x)]);}
  poly2d(ctx,rpts,sx,sy,'#ff6b35',2);
  // r markers
  [[P.r1,'rgba(255,255,80,.4)'],[P.r4,'rgba(0,212,255,.4)'],[P.r5,'rgba(255,107,53,.4)']].forEach(([r,col])=>{
    ctx.strokeStyle=col;ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(sx(r),pad);ctx.lineTo(sx(r),H-pad);ctx.stroke();ctx.setLineDash([]);
  });
  ctx.fillStyle='#3a5070';ctx.font='9px Share Tech Mono';ctx.fillText('r/Rmax',W-pad-35,H-4);
}

function updateMetrics(){
  fwAmp=fitScale(shapeFW); newtonAmp=fitScale(shapeN);
  const fr=rmsV(shapeFW,fwAmp),nr=rmsV(shapeN,newtonAmp);
  $('mFw').textContent=fr.toFixed(1);$('mNw').textContent=nr.toFixed(1);
  $('mAmp').textContent=fwAmp.toFixed(0);
  $('mRmax').textContent=G?G.preset.rMax.toFixed(1):'—';
}

// ── update overlay text ──
function updateOverlay(){
  const viewR=Math.max(P.r5*1.25,1.3);
  $('overlay').innerHTML=
    `viewR: ±${viewR.toFixed(2)} R<sub>max</sub><br>`+
    `mode: ${['σ field','|∇σ| accel','split'][mode]}<br>`+
    `NR×NA: 48×48`;
}

// ── render loop ──
let raf=null, dirty=true;
function render(){
  if(dirty){glDraw();dirty=false;}
  raf=requestAnimationFrame(render);
}
function markDirty(){dirty=true;}

// ── sync controls ──
const sliders=['rho0','rho1','rho2','rho3','rho4','r1','r2','r3','r4','r5','support','amp'];
function syncControls(){
  for(const k of sliders){$(k).value=P[k];$(k+'v').textContent=(k==='amp'?P[k].toFixed(0):P[k].toFixed(3));}
  $('gamma').value=gamma;$('gammav').textContent=gamma.toFixed(2);
  $('logboost').value=logboost;$('logboostv').textContent=logboost.toFixed(0);
}
function readControls(){
  for(const k of sliders)P[k]=+$(k).value;
  gamma=+$('gamma').value; logboost=+$('logboost').value;
  enforceR();
  for(const k of ['r1','r2','r3','r4','r5']){$(k).value=P[k];$(k+'v').textContent=P[k].toFixed(3);}
  $('ampv').textContent=P.amp.toFixed(0);
}

// ── galaxy load ──
const byName=new Map(GALAXIES.map(g=>[g.name,g]));
function loadGalaxy(name){
  G=byName.get(name);
  if(!G)return;
  const pr=PRESETS[name];
  if(pr)Object.assign(P,pr);
  else{P.rho0=1.5;P.rho1=1.2;P.rho2=1.0;P.rho3=.7;P.rho4=.35;P.r1=.05;P.r2=.14;P.r3=.35;P.r4=.95;P.r5=1.05;P.amp=100;P.support=.027;}
  syncControls(); inv1d();
  updateMetrics(); drawRC(); drawOcc(); updateOverlay(); markDirty();
  $('status').textContent=`${G.name} — ${G.rows.length} pts`;
}

// ── populate galaxy list ──
const sel=$('gal');
const pnames=Object.keys(PRESETS).filter(n=>byName.has(n));
for(const n of pnames){const o=document.createElement('option');o.value=n;o.textContent='★ '+n;sel.appendChild(o);}
const sep=document.createElement('option');sep.disabled=true;sep.textContent='──────── all';sel.appendChild(sep);
GALAXIES.filter(g=>!pnames.includes(g.name)).sort((a,b)=>a.name.localeCompare(b.name))
  .forEach(g=>{const o=document.createElement('option');o.value=g.name;o.textContent=g.name;sel.appendChild(o);});

// ── events ──
sel.addEventListener('change',()=>loadGalaxy(sel.value));

for(const k of [...sliders,'gamma','logboost']){
  $(k).addEventListener('input',()=>{
    readControls();
    if(['rho0','rho1','rho2','rho3','rho4','r1','r2','r3','r4','r5','support'].includes(k))inv1d();
    updateMetrics(); drawRC(); drawOcc(); updateOverlay(); markDirty();
  });
}

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    mode=+t.dataset.mode;
    updateOverlay(); markDirty();
  });
});

window.addEventListener('resize',()=>{drawRC();drawOcc();markDirty();});

// ── init ──
render();
const first=pnames[0]||GALAXIES[0]?.name;
if(first){sel.value=first;loadGalaxy(first);}
else $('status').textContent='no data';
</script>
</body>
</html>
