<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Galaxy SVG generator — browser demo</title>
<style>
  body { font-family: sans-serif; max-width: 1000px; margin: 40px auto; padding: 0 20px; color: #222; }
  label { display: inline-block; margin-right: 12px; }
  select, input { font-size: 14px; padding: 4px 8px; }
  button { font-size: 14px; padding: 6px 14px; margin-left: 8px; }
  #out { margin-top: 20px; border: 1px solid #ddd; padding: 10px; background: white; }
  pre { background: #f5f5f5; padding: 10px; overflow: auto; font-size: 11px; max-height: 200px; }
</style>
</head>
<body>
<h1>Galaxy SVG generator</h1>
<p>Browser demo. Loads <code>galaxy_presets.mjs</code> and <code>rotmod_ltg_data.mjs</code> as ES modules and renders any galaxy.</p>

<label>Galaxy:
  <select id="galaxy"></select>
</label>
<button id="render">Render</button>
<button id="download">Download SVG</button>
<button id="showsrc">Show source</button>

<div id="out"></div>
<pre id="src" style="display:none"></pre>

<script type="module">
import { generateGalaxySvg } from './galaxy_svg.mjs';
import { GALAXY_PRESETS } from './galaxy_presets.mjs';
import { ROTMOD_GALAXIES } from './rotmod_ltg_data.mjs';

const data = { presets: GALAXY_PRESETS, rotmod: ROTMOD_GALAXIES };

const sel = document.getElementById('galaxy');
const names = Object.keys(GALAXY_PRESETS).sort();
for (const n of names) {
  const opt = document.createElement('option');
  opt.value = opt.textContent = n;
  sel.appendChild(opt);
}
sel.value = 'NGC3198';

let currentSvg = '';
let currentName = '';

function render() {
  currentName = sel.value;
  try {
    currentSvg = generateGalaxySvg(currentName, data);
    document.getElementById('out').innerHTML = currentSvg;
    document.getElementById('src').textContent = currentSvg;
  } catch (e) {
    document.getElementById('out').textContent = 'Error: ' + e.message;
  }
}

document.getElementById('render').addEventListener('click', render);
document.getElementById('download').addEventListener('click', () => {
  if (!currentSvg) return;
  const blob = new Blob([currentSvg], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = currentName + '.svg';
  a.click();
  URL.revokeObjectURL(url);
});
document.getElementById('showsrc').addEventListener('click', () => {
  const p = document.getElementById('src');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
});

render();
</script>
</body>
</html>
