<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STFR Galaxy Field — GPU Shader</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#03050c;--panel:#06091a;--border:#111e38;
  --accent:#00d4ff;--accent2:#ff6b35;
  --text:#b8ccec;--dim:#3a5070;
  --glow:0 0 14px rgba(0,212,255,0.45);
}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:12px;
     display:flex;flex-direction:column;gap:8px;padding:10px;min-height:100vh}
h1{font-family:'Orbitron',monospace;font-size:14px;color:var(--accent);letter-spacing:.18em;text-shadow:var(--glow)}
.bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;
     padding:8px 12px;background:var(--panel);border:1px solid var(--border);border-radius:7px}
select,button{font-family:'Share Tech Mono',monospace;font-size:11px;
  background:#060b18;color:var(--accent);border:1px solid var(--border);
  border-radius:4px;padding:3px 8px;cursor:pointer}
button{color:var(--accent2);border-color:var(--accent2)}
.tabs{display:flex;gap:3px;flex-wrap:wrap}
.tab{padding:3px 9px;border-radius:4px;border:1px solid var(--border);
     background:var(--panel);color:var(--dim);cursor:pointer;font-size:10px;white-space:nowrap}
.tab.active{border-color:var(--accent);color:var(--accent);background:#060d1e}
.status{color:var(--dim);font-size:10px;margin-left:auto;letter-spacing:.06em}
.building{color:var(--accent2) !important;animation:blink .5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.layout{display:grid;grid-template-columns:1fr 290px;gap:8px;flex:1}
@media(max-width:800px){.layout{grid-template-columns:1fr}}
.canvwrap{position:relative;background:#000;border:1px solid var(--border);border-radius:7px;overflow:hidden}
canvas#gl{display:block;width:100%;height:100%;min-height:480px}
.overlay{position:absolute;top:8px;left:10px;font-size:10px;color:rgba(0,212,255,0.55);pointer-events:none;line-height:1.8}
.sidebar{display:flex;flex-direction:column;gap:7px}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:7px;padding:9px}
.panel h2{font-family:'Orbitron',monospace;font-size:9px;color:var(--dim);letter-spacing:.12em;margin-bottom:7px;text-transform:uppercase}
.row{display:flex;align-items:center;gap:6px;margin:4px 0}
.row label{width:84px;color:var(--dim);font-size:10px;flex-shrink:0}
.row input[type=range]{flex:1;accent-color:var(--accent);height:14px}
.row span{width:48px;text-align:right;color:var(--accent);font-size:10px;font-variant-numeric:tabular-nums}
.sechead{font-size:9px;color:var(--dim);letter-spacing:.1em;margin:8px 0 3px;text-transform:uppercase;border-top:1px solid var(--border);padding-top:6px}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.metric{background:#040810;border:1px solid var(--border);border-radius:5px;padding:5px 7px;text-align:center}
.metric b{display:block;font-size:8px;color:var(--dim);letter-spacing:.07em;margin-bottom:2px}
.metric span{font-size:12px;color:var(--accent)}
canvas#rc{display:block;width:100%;height:130px;border-radius:4px;background:#000}
canvas#occ{display:block;width:100%;height:100px;border-radius:4px;background:#000}
</style>
</head>
<body>
<div class="bar">
  <h1>STFR FIELD / GPU</h1>
  <label>Galaxy <select id="gal"></select></label>
  <div class="tabs">
    <div class="tab active" data-mode="0">σ field</div>
    <div class="tab" data-mode="1">|∇σ| accel</div>
    <div class="tab" data-mode="2">split</div>
    <div class="tab" data-mode="3">ρ luminosity</div>
    <div class="tab" data-mode="4">v flat diagnostic</div>
  </div>
  <span class="status" id="status">initializing…</span>
</div>

<div class="layout">
  <div class="canvwrap">
    <canvas id="gl"></canvas>
    <div class="overlay" id="overlay"></div>
  </div>
  <div class="sidebar">
    <div class="panel">
      <h2>Occupation Profile</h2>
      <div class="row"><label>rho0 core</label><input type="range" id="rho0" min="0" max="8" step="0.01"><span id="rho0v"></span></div>
      <div class="row"><label>rho1 rim</label><input type="range" id="rho1" min="0" max="8" step="0.01"><span id="rho1v"></span></div>
      <div class="row"><label>rho2 inner</label><input type="range" id="rho2" min="0" max="8" step="0.01"><span id="rho2v"></span></div>
      <div class="row"><label>rho3 outer</label><input type="range" id="rho3" min="0" max="8" step="0.01"><span id="rho3v"></span></div>
      <div class="row"><label>rho4 edge</label><input type="range" id="rho4" min="0" max="8" step="0.01"><span id="rho4v"></span></div>
      <div class="sechead">Radii</div>
      <div class="row"><label>r1 core end</label><input type="range" id="r1" min="0.02" max="0.18" step="0.002"><span id="r1v"></span></div>
      <div class="row"><label>r2 trans</label><input type="range" id="r2" min="0.05" max="0.32" step="0.002"><span id="r2v"></span></div>
      <div class="row"><label>r3 shelf</label><input type="range" id="r3" min="0.09" max="0.70" step="0.002"><span id="r3v"></span></div>
      <div class="row"><label>r4 edge end</label><input type="range" id="r4" min="0.65" max="1.80" step="0.002"><span id="r4v"></span></div>
      <div class="row"><label>r5 cutoff</label><input type="range" id="r5" min="0.70" max="2.20" step="0.002"><span id="r5v"></span></div>
      <div class="sechead">Display</div>
      <div class="row"><label>support</label><input type="range" id="support" min="0.002" max="0.08" step="0.001"><span id="supportv"></span></div>
      <div class="row"><label>brightness γ</label><input type="range" id="pgamma" min="0.3" max="2.0" step="0.05"><span id="pgammav"></span></div>
      <div class="row"><label>log boost</label><input type="range" id="logboost" min="2" max="300" step="1"><span id="logboostv"></span></div>
      <div class="row"><label>min bright</label><input type="range" id="minbright" min="0" max="0.4" step="0.005"><span id="minbrightv"></span></div>
      <div class="row"><label>amp</label><input type="range" id="amp" min="50" max="6000" step="1"><span id="ampv"></span></div>
    </div>
    <div class="panel">
      <h2>Metrics</h2>
      <div class="metrics">
        <div class="metric"><b>FW RMS</b><span id="mFw">—</span></div>
        <div class="metric"><b>N RMS</b><span id="mNw">—</span></div>
        <div class="metric"><b>FW AMP</b><span id="mAmp">—</span></div>
        <div class="metric"><b>R_MAX kpc</b><span id="mRmax">—</span></div>
      </div>
    </div>
    <div class="panel"><h2>Rotation Curve</h2><canvas id="rc"></canvas></div>
    <div class="panel"><h2>Occupation vs Brightness</h2><canvas id="occ"></canvas></div>
  </div>
</div>

<script type="module">
const $=id=>document.getElementById(id);

// ── load data ──
let GALAXIES=[];
try{const m=await import('./rotmod_ltg_data.mjs');GALAXIES=m.ROTMOD_GALAXIES;}
catch(e){GALAXIES=[{name:'DEMO',preset:{rMax:10},rows:[
  {r:1,vObs:50,errV:3,vGas:10,vDisk:35,vBul:0,sbDisk:1.0,sbBul:0},
  {r:2,vObs:72,errV:3,vGas:15,vDisk:50,vBul:0,sbDisk:0.7,sbBul:0},
  {r:3,vObs:82,errV:3,vGas:18,vDisk:55,vBul:0,sbDisk:0.4,sbBul:0},
  {r:5,vObs:84,errV:4,vGas:20,vDisk:55,vBul:0,sbDisk:0.15,sbBul:0},
  {r:7,vObs:80,errV:5,vGas:18,vDisk:52,vBul:0,sbDisk:0.04,sbBul:0},
  {r:9,vObs:74,errV:6,vGas:15,vDisk:48,vBul:0,sbDisk:0.01,sbBul:0},
]}];}

import { GALAXY_PRESETS, PRESET_ORDER } from './galaxy_presets.mjs';
const PRESETS = GALAXY_PRESETS;


// ── state ──
let G=null,fwAmp=100,newtonAmp=30,mode=0;
let P={rho0:1.5,rho1:1.2,rho2:1.0,rho3:.7,rho4:.35,r1:.05,r2:.14,r3:.35,r4:.95,r5:1.05,support:.027,amp:100};
let pgamma=0.80,logboost=33,minbright=0.0;

// ── rho profile (JS) ──
const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));
function enforceR(){
  P.r1=clamp(P.r1,.02,.18);
  P.r2=clamp(Math.max(P.r1+.012,P.r2),.05,.32);
  P.r3=clamp(Math.max(P.r2+.018,P.r3),.09,.70);
  P.r4=clamp(Math.max(P.r3+.04,P.r4),.65,1.80);
  P.r5=clamp(Math.max(P.r4+.01,P.r5),.70,2.20);
}
function rho(x){
  enforceR();
  if(x<=P.r1)return P.rho0+(P.rho1-P.rho0)*(x/P.r1);
  if(x<=P.r2)return P.rho1+(P.rho2-P.rho1)*((x-P.r1)/(P.r2-P.r1));
  if(x<=P.r3)return P.rho2+(P.rho3-P.rho2)*((x-P.r2)/(P.r3-P.r2));
  if(x<=P.r4)return P.rho3+(P.rho4-P.rho3)*((x-P.r3)/(P.r4-P.r3));
  if(x<=P.r5)return P.rho4*(1-(x-P.r4)/(P.r5-P.r4));
  return 0;
}

// ── 1D cache for rotation curve ──
let cache1d=null;
function inv1d(){cache1d=null;}
function build1d(){
  if(cache1d)return cache1d;
  const NR=168,NA=96,maxR=Math.max(P.r5,.05),sup=P.support;
  const soft=Math.max(.012,.021*1.75,maxR/NR*1.6),s2=soft*soft;
  const xmax=Math.max(2.35,P.r5*1.15),N=380,xs=[],sig=[];
  for(let i=0;i<N;i++){
    const x=i/(N-1)*xmax;xs.push(x);let s=0;
    for(let ri=0;ri<NR;ri++){
      const rr=(ri+.5)/NR*maxR,dr=maxR/NR,den=rho(rr);
      if(den<=0)continue;
      const d2=sup*den*den;let avg=0;
      for(let a=0;a<NA;a++){
        const th=(a+.5)/NA*Math.PI*2,dx=x-rr*Math.cos(th),dy=rr*Math.sin(th);
        avg+=Math.sqrt(1+d2/(dx*dx+dy*dy+s2))-1;
      }
      s+=(avg/NA)*den*rr*dr*Math.PI*2;
    }
    sig.push(s);
  }
  const sm=sig.slice(),kernel=[1,4,7,10,7,4,1],ks=34;
  for(let i=0;i<N;i++){let a=0;for(let k=0;k<7;k++){const j=clamp(i+k-3,0,N-1);a+=sig[j]*kernel[k];}sm[i]=a/ks;}
  const grad=[];
  for(let i=0;i<N;i++){const i0=Math.max(0,i-2),i1=Math.min(N-1,i+2);grad.push((sm[i1]-sm[i0])/(xs[i1]-xs[i0]||1));}
  cache1d={xs,sig:sm,grad,xmax,N};return cache1d;
}
function interp1(arr,x){const c=build1d();if(x<=0)return arr[0];if(x>=c.xmax)return arr[c.N-1];const f=x/c.xmax*(c.N-1),i=Math.floor(f),t=f-i;return arr[i]*(1-t)+arr[i+1]*t;}
function shapeFW(x){return Math.sqrt(Math.max(x*Math.max(0,-interp1(build1d().grad,x)),0));}
function mEnc(x){let m=0,N=120;for(let i=0;i<N;i++){const rr=(i+.5)/N*x;m+=rho(rr)*rr*(x/N);}return 2*Math.PI*m;}
function shapeN(x){return Math.sqrt(Math.max(mEnc(x)/Math.max(x,1e-4),0));}
function fitScale(fn){if(!G)return 100;let n=0,d=0;for(const r of G.rows){const x=r.r/G.preset.rMax,s=fn(x),w=1/Math.max(1,r.errV*r.errV);n+=s*r.vObs*w;d+=s*s*w;}return d?n/d:100;}
function rmsV(fn,a){if(!G)return 0;let s=0,n=0;for(const r of G.rows){const x=r.r/G.preset.rMax,e=a*fn(x)-r.vObs;s+=e*e;n++;}return Math.sqrt(s/Math.max(1,n));}

// ── 2D sigma for texture (JS, golden-angle ring rotation to avoid spokes) ──
function sigma2d(px,py){
  const NR=64,NA=64,maxR=Math.max(P.r5,.05),sup=P.support;
  const soft=Math.max(.012,.021*1.75,maxR/NR*1.6),s2=soft*soft;
  let sig=0;
  for(let i=0;i<NR;i++){
    const rr=(i+.5)/NR*maxR,dr=maxR/NR,den=rho(rr);
    if(den<=0)continue;
    const d2=sup*den*den;
    const angOff=i*2.399963229; // golden angle in radians, unique per ring
    let avg=0;
    for(let a=0;a<NA;a++){
      const th=(a+.5)/NA*Math.PI*2+angOff;
      const dx=px-rr*Math.cos(th),dy=py-rr*Math.sin(th);
      avg+=Math.sqrt(1+d2/(dx*dx+dy*dy+s2))-1;
    }
    sig+=(avg/NA)*den*rr*dr*Math.PI*2;
  }
  return sig;
}

// ── WebGL ──
const cvs=$('gl');
const gl=cvs.getContext('webgl2');
if(!gl){$('status').textContent='WebGL2 required';throw new Error();}

const VS=`#version 300 es
precision highp float;
in vec2 aPos;out vec2 vUV;
void main(){vUV=aPos*.5+.5;gl_Position=vec4(aPos,0,1);}`;

// All modes sample from the precomputed sigma texture.
// Gradient and signed-derivative use bilinear-interpolated texture values
// so no spoke noise and no second-derivative noise.
const FS=`#version 300 es
precision highp float;
in vec2 vUV;out vec4 fragColor;

uniform float rho0,rho1,rho2,rho3,rho4;
uniform float ur1,ur2,ur3,ur4,ur5;
uniform float viewR,texViewR,fwAmp,texSigmaMax;
uniform int   dispMode;
uniform float logBoost,pgamma,minBright;
uniform sampler2D uSigmaTex;

float rhoAt(float x){
  if(x<=0.)return rho0;
  if(x<=ur1)return rho0+(rho1-rho0)*(x/ur1);
  if(x<=ur2)return rho1+(rho2-rho1)*((x-ur1)/(ur2-ur1));
  if(x<=ur3)return rho2+(rho3-rho2)*((x-ur2)/(ur3-ur2));
  if(x<=ur4)return rho3+(rho4-rho3)*((x-ur3)/(ur4-ur3));
  if(x<=ur5)return rho4*(1.-(x-ur4)/(ur5-ur4));
  return 0.;
}

// Manual bilinear sample — works with NEAREST or LINEAR float texture
float sigS(float px,float py){
  vec2 uv=vec2(px,py)/(texViewR*2.)+.5;
  uv=clamp(uv,0.0,1.0);
  // texel coordinates
  float texN=192.0;
  vec2 tc=uv*texN-0.5;
  vec2 f=fract(tc);
  vec2 i=floor(tc);
  // 4 neighbours, clamped
  vec2 uv00=(i+vec2(0.5))/texN;
  vec2 uv10=(i+vec2(1.5,0.5))/texN;
  vec2 uv01=(i+vec2(0.5,1.5))/texN;
  vec2 uv11=(i+vec2(1.5))/texN;
  float s00=texture(uSigmaTex,clamp(uv00,0.0,1.0)).r;
  float s10=texture(uSigmaTex,clamp(uv10,0.0,1.0)).r;
  float s01=texture(uSigmaTex,clamp(uv01,0.0,1.0)).r;
  float s11=texture(uSigmaTex,clamp(uv11,0.0,1.0)).r;
  return mix(mix(s00,s10,f.x),mix(s01,s11,f.x),f.y);
}

// log compress + gamma + minimum brightness floor
float compress(float v,float boost,float g,float mn){
  float t=log(1.+v*boost)/log(1.+boost);
  t=clamp(t,0.,1.);
  return mn+(1.-mn)*pow(t,1./g);
}

// ── colour maps ──
vec3 cSigma(float t){
  vec3 a=vec3(.01,.02,.06),b=vec3(.02,.08,.35),
       c=vec3(0.,.35,.85),d=vec3(0.,.85,1.),e=vec3(1.);
  if(t<.25)return mix(a,b,t/.25);
  if(t<.5) return mix(b,c,(t-.25)/.25);
  if(t<.75)return mix(c,d,(t-.5)/.25);
  return mix(d,e,(t-.75)/.25);
}
vec3 cGrad(float t){
  vec3 a=vec3(.01,0.,.04),b=vec3(.25,0.,.55),
       c=vec3(.95,0.,.6),d=vec3(1.,.5,.05),e=vec3(1.,1.,.7);
  if(t<.25)return mix(a,b,t/.25);
  if(t<.5) return mix(b,c,(t-.25)/.25);
  if(t<.75)return mix(c,d,(t-.5)/.25);
  return mix(d,e,(t-.75)/.25);
}
vec3 cLum(float t){
  // warm galaxy image: black -> dark red -> orange -> yellow -> white
  vec3 a=vec3(0.),b=vec3(.18,.03,.005),
       c=vec3(.65,.2,.01),d=vec3(1.,.72,.15),e=vec3(1.,1.,.93);
  if(t<.25)return mix(a,b,t/.25);
  if(t<.5) return mix(b,c,(t-.25)/.25);
  if(t<.75)return mix(c,d,(t-.5)/.25);
  return mix(d,e,(t-.75)/.25);
}
// HSV → RGB
vec3 hsv2rgb(float h,float s,float v){
  h=mod(h,360.);
  float c=v*s,x=c*(1.-abs(mod(h/60.,2.)-1.)),m=v-c;
  vec3 rgb;
  if(h<60.)  rgb=vec3(c,x,0.);
  else if(h<120.)rgb=vec3(x,c,0.);
  else if(h<180.)rgb=vec3(0.,c,x);
  else if(h<240.)rgb=vec3(0.,x,c);
  else if(h<300.)rgb=vec3(x,0.,c);
  else           rgb=vec3(c,0.,x);
  return rgb+m;
}
vec3 cSigned(float sgn,float mag){
  // green=120° at zero crossing
  // positive (rising outward) rotates toward blue 240°
  // negative (falling outward) rotates toward red 0°
  // magnitude drives both the hue swing and brightness (black at zero)
  // sgn is -1..+1 (continuous): 0=flat RC, +1=rising, -1=falling
  // green=120°, rotate +90° toward blue(210°) for rising
  //                        -90° toward red(30°) for falling
  float hue=120.+sgn*90.;
  // near zero: dark and desaturated (hard to see = good, means flat)
  // away from zero: bright and saturated
  return hsv2rgb(hue, mag, mag);
}

void main(){
  vec2 uv=vUV*2.-1.;
  float px=uv.x*viewR, py=uv.y*viewR;
  float r=length(vec2(px,py));
  // step size = 2 texels in world units for clean derivatives
  float eps=texViewR*2./128.*2.;

  vec3 col;

  if(dispMode==3){
    // ── ρ luminosity ──
    // Normalize rho shape to [0,1] by peak, then scale by log(amp) so
    // mass-rich (high amp) galaxies appear overall brighter than light-rich ones
    float peak=max(rho0,max(rho1,max(rho2,max(rho3,rho4))))+.001;
    float normRho=rhoAt(r)/peak;
    // log(amp) factor: amp=100->1.0, amp=4200->1.89
    float ampFactor=log(fwAmp+1.)/log(101.);
    col=cLum(compress(normRho*ampFactor, logBoost*.8, pgamma, minBright*(normRho>0.?1.:0.)));

  } else if(dispMode==4){
    // ── flat rotation curve diagnostic ──
    // v²(r) = r * |∇σ|, so v is flat where d(r*|∇σ|)/dr = 0
    // i.e.  |∇σ| + r * d|∇σ|/dr = 0
    // Define δ = d|∇σ|/dr + |∇σ|/r
    //   δ > 0 : v still rising outward  → blue
    //   δ = 0 : v perfectly flat        → green
    //   δ < 0 : v declining outward     → red
    // Only needs first derivatives (one step), so much more stable than d²
    vec2 rhat=r>.001?vec2(px,py)/r:vec2(1.,0.);
    vec2 tang=vec2(-rhat.y,rhat.x);

    // |∇σ| at current point via central differences on sigma texture
    float srp=sigS(px+rhat.x*eps,py+rhat.y*eps);
    float srm=sigS(px-rhat.x*eps,py-rhat.y*eps);
    float stp=sigS(px+tang.x*eps,py+tang.y*eps);
    float stm=sigS(px-tang.x*eps,py-tang.y*eps);
    float gm=length(vec2(srp-srm,stp-stm))/(2.*eps);

    // d|∇σ|/dr via forward difference (one extra step outward)
    // use 2*eps step for stability — still only first derivative
    float srp2=sigS(px+rhat.x*eps*3.,py+rhat.y*eps*3.);
    float srm2=sigS(px+rhat.x*eps*1.,py+rhat.y*eps*1.);
    float stp2=sigS(px+rhat.x*eps*2.+tang.x*eps,py+rhat.y*eps*2.+tang.y*eps);
    float stm2=sigS(px+rhat.x*eps*2.-tang.x*eps,py+rhat.y*eps*2.-tang.y*eps);
    float gm1=length(vec2(srp2-srm2,stp2-stm2))/(2.*eps);
    float dgdr=(gm1-gm)/(2.*eps);

    // flat RC diagnostic: δ = dgdr + gm/r
    // avoid divide-by-zero at centre
    float safeR=max(r,eps*2.);
    float delta=dgdr+gm/safeR;

    // Scale delta — typical gm~0.1, r~0.5, so gm/r~0.2, dgdr~-0.2 at flat region
    // normalise by gm/r so the colour is relative to local field strength
    float norm=max(gm/safeR,0.0001);
    float scaledDelta=delta/norm; // ~0 at flat, ~+1 rising, ~-1 falling

    // Soft clamp so ±1 = full red/blue swing, smooth near zero = green
    float softVal=clamp(scaledDelta,-1.,1.);
    // magnitude = how far from flat (for brightness)
    float mag=compress(abs(softVal),logBoost*0.5,pgamma,minBright);
    col=cSigned(softVal,mag);

  } else {
    // ── modes 0/1/2: sigma, |∇σ|, split — all bilinear from texture ──
    float s  =sigS(px,py);
    float sxp=sigS(px+eps,py), sxm=sigS(px-eps,py);
    float syp=sigS(px,py+eps), sym=sigS(px,py-eps);
    float gx=(sxp-sxm)/(2.*eps), gy=(syp-sym)/(2.*eps);
    float gm=length(vec2(gx,gy));

    bool lh=(uv.x<0.);
    if(dispMode==1){
      // raw texture value debug: should show bright center, dark edges
      float raw=s/texSigmaMax; // 0..1
      col=vec3(raw,raw*0.5,0.0);
    } else if(dispMode==0||(dispMode==2&&lh))
      col=cSigma(compress(s,logBoost,pgamma,minBright));
    else
      col=cGrad(compress(gm,logBoost*2.5,pgamma,minBright));
    if(dispMode==2&&abs(uv.x)<viewR*2./800.*1.5)
      col=vec3(.15,.25,.4);
  }

  // ── dashed ring overlays ──
  float rings[5]; rings[0]=ur1;rings[1]=ur2;rings[2]=ur3;rings[3]=ur4;rings[4]=ur5;
  vec3 rc[5];
  rc[0]=vec3(1.,1.,.3);rc[1]=vec3(1.,.8,.2);rc[2]=vec3(.3,1.,.3);
  rc[3]=vec3(0.,.85,1.);rc[4]=vec3(1.,.42,.2);
  float ps=viewR*2./800.;
  for(int i=0;i<5;i++){
    float dr=abs(r-rings[i]);
    if(dr<ps*1.4){
      float dash=mod(atan(py,px)*rings[i]/ps,12.);
      if(dash<7.){
        float blend=(1.-dr/(ps*1.4))*((dispMode==3||dispMode==4)?.4:.65);
        col=mix(col,rc[i]*.85,blend);
      }
    }
  }
  fragColor=vec4(col,1.);
}`;

function mkShader(src,type){
  const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))throw new Error('Shader:\n'+gl.getShaderInfoLog(s));
  return s;
}
function mkProg(vs,fs){
  const p=gl.createProgram();gl.attachShader(p,vs);gl.attachShader(p,fs);gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS))throw new Error('Link:\n'+gl.getProgramInfoLog(p));
  return p;
}
let prog;
try{prog=mkProg(mkShader(VS,gl.VERTEX_SHADER),mkShader(FS,gl.FRAGMENT_SHADER));}
catch(e){$('status').textContent=e.message.slice(0,80);throw e;}

// quad
const vbuf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,vbuf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const aPos=gl.getAttribLocation(prog,'aPos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,0,0);

// sigma texture (float, bilinear)
const TEX_N=192;
let texViewR=1.3;
const sigTexObj=gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D,sigTexObj);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
// Try float texture for full precision (needed for clean derivatives)
const _floatLinear=gl.getExtension('OES_texture_float_linear');
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,_floatLinear?gl.LINEAR:gl.NEAREST);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,_floatLinear?gl.LINEAR:gl.NEAREST);
gl.texImage2D(gl.TEXTURE_2D,0,gl.R32F,TEX_N,TEX_N,0,gl.RED,gl.FLOAT,new Float32Array(TEX_N*TEX_N));

// uniforms
const U={};
['rho0','rho1','rho2','rho3','rho4','ur1','ur2','ur3','ur4','ur5',
 'viewR','texViewR','fwAmp','texSigmaMax','dispMode','logBoost','pgamma','minBright','uSigmaTex'
].forEach(n=>U[n]=gl.getUniformLocation(prog,n));

function setUniforms(){
  enforceR();
  gl.useProgram(prog);
  gl.uniform1f(U.rho0,P.rho0);gl.uniform1f(U.rho1,P.rho1);
  gl.uniform1f(U.rho2,P.rho2);gl.uniform1f(U.rho3,P.rho3);gl.uniform1f(U.rho4,P.rho4);
  gl.uniform1f(U.ur1,P.r1);gl.uniform1f(U.ur2,P.r2);gl.uniform1f(U.ur3,P.r3);
  gl.uniform1f(U.ur4,P.r4);gl.uniform1f(U.ur5,P.r5);
  gl.uniform1f(U.viewR,Math.max(P.r5*1.25,1.3));
  gl.uniform1f(U.texViewR,texViewR);
  gl.uniform1f(U.fwAmp,fwAmp);
  gl.uniform1f(U.texSigmaMax,texSigmaMax);
  gl.uniform1i(U.dispMode,mode);
  gl.uniform1f(U.logBoost,logboost);
  gl.uniform1f(U.pgamma,pgamma);
  gl.uniform1f(U.minBright,minbright);
  gl.uniform1i(U.uSigmaTex,0);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D,sigTexObj);
}

function glDraw(){
  const dpr=Math.min(devicePixelRatio||1,2);
  const rect=cvs.getBoundingClientRect();
  cvs.width=Math.round(rect.width*dpr);
  cvs.height=Math.round(rect.height*dpr);
  gl.viewport(0,0,cvs.width,cvs.height);
  setUniforms();
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}

// ── async texture build ──
let texDirty=true, buildId=0, texSigmaMax=1.0;
async function buildTex(){
  const myId=++buildId;
  // Snapshot P immediately so async yields don't see mutations
  enforceR();
  const snap={...P};
  console.log('buildTex start, rho0='+snap.rho0+' r5='+snap.r5);
  const vR=Math.max(snap.r5*1.25,1.3);
  texViewR=vR;
  const N=TEX_N, data=new Float32Array(N*N);
  $('status').className='status building';
  $('status').textContent='building σ texture…';
  // sigma using snapshot (not global P)
  function rhoSnap(x){
    if(x<=snap.r1)return snap.rho0+(snap.rho1-snap.rho0)*(x/snap.r1);
    if(x<=snap.r2)return snap.rho1+(snap.rho2-snap.rho1)*((x-snap.r1)/(snap.r2-snap.r1));
    if(x<=snap.r3)return snap.rho2+(snap.rho3-snap.rho2)*((x-snap.r2)/(snap.r3-snap.r2));
    if(x<=snap.r4)return snap.rho3+(snap.rho4-snap.rho3)*((x-snap.r3)/(snap.r4-snap.r3));
    if(x<=snap.r5)return snap.rho4*(1-(x-snap.r4)/(snap.r5-snap.r4));
    return 0;
  }
  function sigma2dSnap(px,py){
    const NR=64,NA=64,maxR=Math.max(snap.r5,.05),sup=snap.support;
    const soft=Math.max(.012,.021*1.75,maxR/NR*1.6),s2=soft*soft;
    let sig=0;
    for(let i=0;i<NR;i++){
      const rr=(i+.5)/NR*maxR,dr=maxR/NR,den=rhoSnap(rr);
      if(den<=0)continue;
      const d2=sup*den*den;
      const angOff=i*2.399963229;
      let avg=0;
      for(let a=0;a<NA;a++){
        const th=(a+.5)/NA*Math.PI*2+angOff;
        const dx=px-rr*Math.cos(th),dy=py-rr*Math.sin(th);
        avg+=Math.sqrt(1+d2/(dx*dx+dy*dy+s2))-1;
      }
      sig+=(avg/NA)*den*rr*dr*Math.PI*2;
    }
    return sig;
  }
  for(let row=0;row<N;row+=3){
    for(let r2=row;r2<Math.min(row+3,N);r2++){
      const py=vR-(r2/(N-1))*vR*2;
      for(let col=0;col<N;col++){
        const px=-vR+(col/(N-1))*vR*2;
        data[r2*N+col]=sigma2dSnap(px,py);
      }
    }
    await new Promise(r=>setTimeout(r,0));
    if(myId!==buildId)return; // superseded
  }
  gl.bindTexture(gl.TEXTURE_2D,sigTexObj);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.R32F,N,N,0,gl.RED,gl.FLOAT,data);
  // sigMax=1 since float texture stores raw values directly
  texSigmaMax=1.0;
  const ctr=data[Math.floor(N/2)*N+Math.floor(N/2)];
  console.log('tex built float: center='+ctr.toFixed(5)+' max='+Math.max(...data).toFixed(5));
  texDirty=false;
  markDirty();
  $('status').className='status';
  $('status').textContent=G?`${G.name} — ${G.rows.length} pts`:'ready';
}

// ── canvas charts ──
function p2d(ctx,pts,sx,sy,col,lw=2,dash=[]){
  ctx.save();ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.setLineDash(dash);
  ctx.beginPath();pts.forEach(([x,y],i)=>i?ctx.lineTo(sx(x),sy(y)):ctx.moveTo(sx(x),sy(y)));
  ctx.stroke();ctx.restore();
}
function drawRC(){
  const c=$('rc'),dpr=Math.min(devicePixelRatio||1,2),rect=c.getBoundingClientRect();
  c.width=Math.round(rect.width*dpr);c.height=Math.round(rect.height*dpr);
  const ctx=c.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);
  const W=rect.width,H=rect.height,pad=26;
  ctx.fillStyle='#03050c';ctx.fillRect(0,0,W,H);
  if(!G)return;
  const xmax=Math.max(1.55,P.r5*1.08),N=100;
  const fw=[],nw=[];
  for(let i=0;i<N;i++){const x=i/(N-1)*xmax;fw.push([x,fwAmp*shapeFW(x)]);nw.push([x,newtonAmp*shapeN(x)]);}
  const ymax=Math.max(...G.rows.map(r=>r.vObs),...fw.map(p=>p[1]),...nw.map(p=>p[1]),1)*1.12;
  const sx=x=>pad+x/xmax*(W-2*pad),sy=y=>H-pad-y/ymax*(H-2*pad);
  ctx.strokeStyle='#0a1420';ctx.lineWidth=1;
  for(let i=0;i<=3;i++){const y=ymax*i/3;ctx.beginPath();ctx.moveTo(pad,sy(y));ctx.lineTo(W-pad,sy(y));ctx.stroke();}
  p2d(ctx,nw,sx,sy,'#3a5070',1.2,[4,3]);
  p2d(ctx,fw,sx,sy,'#00d4ff',2);
  for(const r of G.rows){
    const x=r.r/G.preset.rMax;
    ctx.strokeStyle='#3a5070';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(sx(x),sy(r.vObs-r.errV));ctx.lineTo(sx(x),sy(r.vObs+r.errV));ctx.stroke();
    ctx.fillStyle='#b8ccec';ctx.beginPath();ctx.arc(sx(x),sy(r.vObs),2,0,Math.PI*2);ctx.fill();
  }
  ctx.fillStyle='#3a5070';ctx.font='9px Share Tech Mono';ctx.fillText('r/Rmax',W-pad-35,H-4);
}
function drawOcc(){
  const c=$('occ'),dpr=Math.min(devicePixelRatio||1,2),rect=c.getBoundingClientRect();
  c.width=Math.round(rect.width*dpr);c.height=Math.round(rect.height*dpr);
  const ctx=c.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);
  const W=rect.width,H=rect.height,pad=26;
  ctx.fillStyle='#03050c';ctx.fillRect(0,0,W,H);
  const xmax=Math.max(1.55,P.r5*1.08);
  const rMax=Math.max(P.rho0,P.rho1,P.rho2,P.rho3,P.rho4)*1.1||1;
  const sx=x=>pad+x/xmax*(W-2*pad),sy=y=>H-pad-y/rMax*(H-2*pad);
  if(G){
    const bs=G.rows.map(r=>Math.max(0,r.sbDisk+r.sbBul)),bMax=Math.max(...bs,1);
    ctx.strokeStyle='#1e3050';ctx.lineWidth=1.5;
    ctx.beginPath();G.rows.forEach((r,i)=>{const x=r.r/G.preset.rMax,y=bs[i]/bMax*rMax;i?ctx.lineTo(sx(x),sy(y)):ctx.moveTo(sx(x),sy(y));});ctx.stroke();
    ctx.fillStyle='rgba(30,48,80,.2)';ctx.beginPath();ctx.moveTo(sx(0),sy(0));
    G.rows.forEach((r,i)=>ctx.lineTo(sx(r.r/G.preset.rMax),sy(bs[i]/bMax*rMax)));
    ctx.lineTo(sx(G.rows[G.rows.length-1].r/G.preset.rMax),sy(0));ctx.closePath();ctx.fill();
  }
  const rpts=[];for(let i=0;i<180;i++){const x=i/179*xmax;rpts.push([x,rho(x)]);}
  p2d(ctx,rpts,sx,sy,'#ff6b35',2);
  [[P.r1,'rgba(255,255,80,.4)'],[P.r4,'rgba(0,212,255,.4)'],[P.r5,'rgba(255,107,53,.4)']].forEach(([r,col])=>{
    ctx.strokeStyle=col;ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(sx(r),pad);ctx.lineTo(sx(r),H-pad);ctx.stroke();ctx.setLineDash([]);
  });
  ctx.fillStyle='#3a5070';ctx.font='9px Share Tech Mono';ctx.fillText('r/Rmax',W-pad-35,H-4);
}
function updateMetrics(){
  fwAmp=fitScale(shapeFW);newtonAmp=fitScale(shapeN);
  $('mFw').textContent=rmsV(shapeFW,fwAmp).toFixed(1);
  $('mNw').textContent=rmsV(shapeN,newtonAmp).toFixed(1);
  $('mAmp').textContent=fwAmp.toFixed(0);
  $('mRmax').textContent=G?G.preset.rMax.toFixed(1):'—';
}
function updateOverlay(){
  const vR=Math.max(P.r5*1.25,1.3);
  $('overlay').innerHTML=
    `viewR ±${vR.toFixed(2)} R<sub>max</sub><br>`+
    `tex ${TEX_N}² bilinear<br>`+
    `mode: ${['σ','|∇σ|','split','ρ lum','∂|∇σ|/∂r'][mode]}`;
}

// ── render loop ──
let dirty=true;
function markDirty(){dirty=true;}
(function loop(){requestAnimationFrame(loop);if(dirty){glDraw();dirty=false;}})();

// ── slider sync ──
const physSliders=['rho0','rho1','rho2','rho3','rho4','r1','r2','r3','r4','r5','support'];
const allSliders=[...physSliders,'amp','pgamma','logboost','minbright'];

function syncLabels(){
  enforceR();
  for(const k of physSliders){
    $(k).value=P[k];
    $(k+'v').textContent=P[k].toFixed(3);
  }
  $('amp').value=P.amp; $('ampv').textContent=P.amp.toFixed(0);
  $('pgamma').value=pgamma; $('pgammav').textContent=pgamma.toFixed(2);
  $('logboost').value=logboost; $('logboostv').textContent=logboost.toFixed(0);
  $('minbright').value=minbright; $('minbrightv').textContent=minbright.toFixed(3);
}

let texTimer=null;
function onSlider(e){
  const id=e.target.id;
  // read all values
  for(const k of physSliders)P[k]=+$(k).value;
  P.amp=+$('amp').value;
  pgamma=+$('pgamma').value;
  logboost=+$('logboost').value;
  minbright=+$('minbright').value;
  enforceR();
  // update labels immediately
  syncLabels();
  // physics changed?
  if(physSliders.includes(id)){inv1d();}
  updateMetrics();drawRC();drawOcc();updateOverlay();markDirty();
  // debounce texture rebuild for physics sliders
  if(physSliders.includes(id)){
    clearTimeout(texTimer);
    texTimer=setTimeout(()=>buildTex(),700);
  }
}

for(const k of allSliders)$(k).addEventListener('input',onSlider);

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    mode=+t.dataset.mode;
    updateOverlay();markDirty();
  });
});
window.addEventListener('resize',()=>{drawRC();drawOcc();markDirty();});

// ── galaxy load ──
const byName=new Map(GALAXIES.map(g=>[g.name,g]));
function loadGalaxy(name){
  G=byName.get(name);if(!G)return;
  const pr=PRESETS[name];
  if(pr)Object.assign(P,pr);
  else Object.assign(P,{rho0:1.5,rho1:1.2,rho2:1.0,rho3:.7,rho4:.35,r1:.05,r2:.14,r3:.35,r4:.95,r5:1.05,amp:100,support:.027});
  syncLabels();inv1d();
  updateMetrics();drawRC();drawOcc();updateOverlay();markDirty();
  buildTex();
}

// populate list
const sel=$('gal');
const pnames=Object.keys(PRESETS).filter(n=>byName.has(n));
for(const n of pnames){const o=document.createElement('option');o.value=n;o.textContent='★ '+n;sel.appendChild(o);}
const sep=document.createElement('option');sep.disabled=true;sep.textContent='──────── all';sel.appendChild(sep);
GALAXIES.filter(g=>!pnames.includes(g.name)).sort((a,b)=>a.name.localeCompare(b.name))
  .forEach(g=>{const o=document.createElement('option');o.value=g.name;o.textContent=g.name;sel.appendChild(o);});
sel.addEventListener('change',()=>loadGalaxy(sel.value));

// init
const first=pnames[0]||GALAXIES[0]?.name;
if(first){sel.value=first;loadGalaxy(first);}
</script>
