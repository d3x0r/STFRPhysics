class Vec extends Array {
	constructor ( a, b, c ) {
		super();
		this.push( 0 );
		this.push( 0 );
		this.push( 0 );
		a && (this[0] = a);
		b && (this[1] = b);
		c && (this[2] = c);
	}
	cross(a) {
		{
			const alen2 = Math.sqrt(a.dot(a));
			const tlen2 = Math.sqrt(this.dot(this));
			const q = new Vec();

			const qx = (this[1]/tlen2)*(a[2]/alen2)-(this[2]/tlen2)*(a[1]/alen2);
			const qy = (this[2]/tlen2)*(a[0]/alen2)-(this[0]/tlen2)*(a[2]/alen2);
			const qz = (this[0]/tlen2)*(a[1]/alen2)-(this[1]/tlen2)*(a[0]/alen2);
			const qr = new Vec( qx, qy, qz );
			const s = qr.len;
			qr.normalize().scale( Math.asin( s ) );
			
			return qr;
		}
		return new Vec( this[1]*a[2]-this[2]*a[1], this[2]*a[0]-this[0]*a[2], this[0]*a[1]-this[1]*a[0] );
	}
	set(a){
		this[0] = a[0];
		this[1] = a[1];
		this[2] = a[2];
		return this;
	}
	normalize() {
		const l = this.len;
		if( l ) { return this.scale( 1/l ) }
		else { this[0] = 1; this[1] = 0; this[2] = 0; }
		return this;
	}
	scale(a) {
		this[0] *= a;
		this[1] *= a;
		this[2] *= a;
		return this;
	}
	addScaled(a,s) {
		this[0] = this[0] + a[0]*s;
		this[1] = this[1] + a[1]*s;
		this[2] = this[2] + a[2]*s;
		return this;
	}
	add(a) {
		this[0] = this[0] + a[0];
		this[1] = this[1] + a[1];
		this[2] = this[2] + a[2];
		return this;
	}
	get len() {
		return Math.sqrt( this.dot( this ) );
	}
	dot(a) {
		return this[0]*a[0]+this[1]*a[1] + this[2]*a[2];
	}
}
